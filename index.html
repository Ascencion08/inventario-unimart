<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stock">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <title>Inventario — Unimart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════
       PANTALLA DE LOGIN
       ════════════════════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-logo">📦</div>
    <div class="login-title">Inventario Unimart</div>
    <div class="login-sub">Tu nombre queda registrado en<br>cada movimiento que hacés.</div>

    <div class="login-box">
      <div class="field" style="margin: 0;">
        <label for="login-name">Tu nombre</label>
        <input type="text" id="login-name" placeholder="Ej: María González" autocomplete="name">
      </div>
      <button class="btn primary full" id="btn-login-colab">Entrar como colaborador →</button>
      <div class="login-sep">o</div>
      <button class="btn secondary full" id="btn-login-admin">🔑 Acceso supervisor</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       MODAL: PIN de supervisor
       ════════════════════════════════════════════════════════ -->
  <div class="overlay" id="modal-pin">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2 style="text-align: center;">PIN de supervisor</h2>
      <div class="pin-display" id="pin-display">○○○○</div>
      <div class="pin-grid" id="pin-grid"></div>
      <div class="pin-error" id="pin-error"></div>
      <div style="margin-top: 16px;">
        <button class="btn secondary full" id="btn-pin-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       APP PRINCIPAL
       ════════════════════════════════════════════════════════ -->
  <div class="app" id="main-app" style="display: none;">

    <!-- Topbar -->
    <header class="topbar">
      <span class="topbar-logo">Stock</span>
      <span class="topbar-title" id="topbar-title">Inicio</span>
      <span class="alert-dot" id="alert-dot" aria-hidden="true"></span>
      <span class="role-badge" id="role-badge"></span>
      <!-- Logout -->
      <button class="btn-icon" id="btn-logout" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </header>

    <!-- Contenido -->
    <main class="content">

      <!-- ── Inicio ── -->
      <section class="page active" id="page-inicio" aria-label="Inicio">
        <div id="alert-bar" class="alert-bar" role="alert"></div>
        <div class="metrics" id="metrics-grid" aria-label="Métricas de inventario"></div>
        <p class="section-label" id="inicio-label">Stock actual</p>
        <div id="prod-list-inicio">
          <div class="loader-wrap"><div class="spinner"></div>Cargando...</div>
        </div>
      </section>

      <!-- ── Conteo (solo supervisor) ── -->
      <section class="page" id="page-conteo" aria-label="Registrar conteo">
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.6;">
          Ajustá las cantidades reales contadas. Los cambios quedan registrados en el historial.
        </p>
        <div id="conteo-items"></div>
        <div style="margin-top: 6px;">
          <div class="field">
            <label for="conteo-nota">Nota del conteo (opcional)</label>
            <textarea id="conteo-nota" placeholder="Ej: Conteo semanal — martes 15..."></textarea>
          </div>
          <button class="btn primary full" id="btn-guardar-conteo">Guardar conteo</button>
        </div>
      </section>

      <!-- ── Historial ── -->
      <section class="page" id="page-historial" aria-label="Historial de movimientos">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="hist-search" placeholder="Buscar producto o usuario..." aria-label="Buscar en historial">
        </div>
        <div class="filtros" role="group" aria-label="Filtrar por tipo">
          <button class="filtro-btn active" data-filter="todo">Todo</button>
          <button class="filtro-btn" data-filter="uso">Usos</button>
          <button class="filtro-btn" data-filter="conteo">Conteos</button>
        </div>
        <div id="hist-export" style="margin-bottom: 12px; display: none;">
          <button class="btn secondary" id="btn-export-csv">⬇ Exportar CSV</button>
        </div>
        <div id="hist-list">
          <div class="loader-wrap"><div class="spinner"></div>Cargando...</div>
        </div>
      </section>

      <!-- ── Gestión (solo supervisor) ── -->
      <section class="page" id="page-gestion" aria-label="Gestión de productos">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
          <button class="btn secondary" id="btn-add-product">+ Agregar producto</button>
        </div>
        <div id="gestion-list"></div>
      </section>

    </main>

    <!-- Navegación inferior -->
    <nav class="bottom-nav cols2" id="bottom-nav" aria-label="Navegación principal">
      <button class="nav-btn active" id="nav-inicio" aria-label="Ir a Inicio">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </button>
      <button class="nav-btn" id="nav-historial" aria-label="Ir a Historial">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Historial
      </button>
      <button class="nav-btn" id="nav-conteo" style="display: none;" aria-label="Ir a Conteo">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Conteo
      </button>
      <button class="nav-btn" id="nav-gestion" style="display: none;" aria-label="Ir a Gestión">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Gestión
      </button>
    </nav>

  </div><!-- /main-app -->

  <!-- ════════════════════════════════════════════════════════
       MODAL: Producto (crear / editar)
       ════════════════════════════════════════════════════════ -->
  <div class="overlay" id="modal-prod" role="dialog" aria-modal="true" aria-labelledby="modal-prod-title">
    <div class="sheet">
      <div class="sheet-handle" aria-hidden="true"></div>
      <h2 id="modal-prod-title">Agregar producto</h2>
      <input type="hidden" id="mp-id">
      <div class="field">
        <label for="mp-nombre">Nombre</label>
        <input type="text" id="mp-nombre" placeholder="Ej: Hojas de papel bond">
      </div>
      <div class="field">
        <label for="mp-unidad">Unidad de medida</label>
        <select id="mp-unidad">
          <option>Resmas</option>
          <option>Rollos</option>
          <option>Unidades</option>
          <option>Cajas</option>
          <option>Metros</option>
          <option>Paquetes</option>
          <option>Galones</option>
          <option>Bolsas</option>
        </select>
      </div>
      <div class="field">
        <label for="mp-stock">Stock actual</label>
        <input type="number" id="mp-stock" min="0" value="0">
      </div>
      <div class="field">
        <label for="mp-min">Cantidad mínima (dispara alerta)</label>
        <input type="number" id="mp-min" min="0" value="5">
      </div>
      <div class="field">
        <label for="mp-icon">Ícono (emoji)</label>
        <input type="text" id="mp-icon" placeholder="📄" maxlength="2">
      </div>
      <div class="sheet-actions">
        <button class="btn secondary" style="flex: 1;" id="btn-cancel-product">Cancelar</button>
        <button class="btn primary"   style="flex: 2;" id="btn-save-product">Guardar</button>
      </div>
      <div id="btn-eliminar-wrap" style="margin-top: 10px; display: none;">
        <button class="btn danger full" id="btn-delete-product">Eliminar producto</button>
      </div>
    </div>
  </div>

  <!-- Toast de notificaciones -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Punto de entrada — type="module" habilita imports entre archivos JS -->
  <script type="module" src="src/js/app.js"></script>

</body>
</html>
